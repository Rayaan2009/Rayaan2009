<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rayaan Bin Saifullah profile banner</title>
  <desc id="desc">Dark glassmorphism banner with cyan and indigo highlights, name, subtitle, and achievement chips.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1100" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020" />
      <stop offset="1" stop-color="#05070D" />
    </linearGradient>
    <linearGradient id="stroke" x1="130" y1="70" x2="1030" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6475FF" stop-opacity="0.7" />
      <stop offset="1" stop-color="#17E6C1" stop-opacity="0.45" />
    </linearGradient>
    <linearGradient id="heading" x1="150" y1="110" x2="760" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C9D1FF" />
      <stop offset="0.45" stop-color="#80CFFF" />
      <stop offset="1" stop-color="#5DF0D1" />
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="240" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121A2E" />
      <stop offset="1" stop-color="#0B1325" />
    </linearGradient>
    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 88) rotate(90) scale(140 140)">
      <stop stop-color="#6475FF" stop-opacity="0.7" />
      <stop offset="1" stop-color="#6475FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orbB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 280) rotate(90) scale(170 170)">
      <stop stop-color="#17E6C1" stop-opacity="0.55" />
      <stop offset="1" stop-color="#17E6C1" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="white" stroke-opacity="0.05" />
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28" />
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000814" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#bg)" />
  <rect width="1200" height="360" rx="30" fill="url(#grid)" />
  <circle cx="930" cy="88" r="140" fill="url(#orbA)" filter="url(#blur)" />
  <circle cx="1010" cy="280" r="170" fill="url(#orbB)" filter="url(#blur)" />

  <rect x="28" y="28" width="1144" height="304" rx="24" fill="white" fill-opacity="0.025" stroke="url(#stroke)" stroke-opacity="0.7" />

  <g filter="url(#softShadow)">
    <rect x="70" y="82" width="8" height="154" rx="4" fill="#6172FF" />
    <rect x="70" y="82" width="150" height="8" rx="4" fill="#6172FF" />
    <path d="M220 90H292C344.467 90 387 132.533 387 185C387 237.467 344.467 280 292 280H220V90Z" fill="none" stroke="url(#heading)" stroke-width="16" stroke-linejoin="round" />
    <path d="M227 187H301C332.48 187 358 161.48 358 130C358 98.5198 332.48 73 301 73H188" opacity="0" />
    <path d="M244 192H286L354 280H310L244 192Z" fill="url(#heading)" />
  </g>

  <text x="310" y="122" fill="#88F5E0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="4">STUDENT DEVELOPER • PROBLEM SOLVER • BUILDER</text>
  <text x="310" y="186" fill="url(#heading)" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Rayaan Bin Saifullah</text>
  <text x="310" y="226" fill="#C6D1E8" font-family="Arial, Helvetica, sans-serif" font-size="20">Building software, automation, and hardware projects that solve real problems.</text>
  <text x="310" y="258" fill="#8A96B3" font-family="Arial, Helvetica, sans-serif" font-size="16">Python • C • Web Development • IoT • Robotics • AI</text>

  <g>
    <rect x="310" y="286" width="190" height="34" rx="17" fill="url(#chip)" stroke="#6475FF" stroke-opacity="0.28" />
    <text x="327" y="308" fill="#E7ECFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">1st place security system</text>
  </g>
  <g>
    <rect x="514" y="286" width="205" height="34" rx="17" fill="url(#chip)" stroke="#51C9FF" stroke-opacity="0.24" />
    <text x="531" y="308" fill="#E7ECFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">2nd place smart automation</text>
  </g>
  <g>
    <rect x="733" y="286" width="168" height="34" rx="17" fill="url(#chip)" stroke="#17E6C1" stroke-opacity="0.28" />
    <text x="750" y="308" fill="#E7ECFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">16K+ HackerRank</text>
  </g>
  <g>
    <rect x="915" y="286" width="132" height="34" rx="17" fill="url(#chip)" stroke="#8EA3FF" stroke-opacity="0.3" />
    <text x="932" y="308" fill="#E7ECFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">CS50 verified</text>
  </g>
</svg>